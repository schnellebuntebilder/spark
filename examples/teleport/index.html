<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Teleport</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
    #ar-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-family: sans-serif;
      cursor: pointer;
      z-index: 100;
      user-select: none;
      -webkit-user-select: none;
    }
    #ar-overlay .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }
    #ar-overlay .label {
      font-size: 22px;
      letter-spacing: 0.04em;
    }
    #ar-overlay .sub {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div id="ar-overlay">
    <div class="icon">📷</div>
    <div class="label">Tap to Start AR</div>
    <div class="sub">WebXR · 8th Wall</div>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "lil-gui": "/examples/js/vendor/lil-gui/dist/lil-gui.esm.js",
        "@sparkjsdev/spark": "../../dist/spark.module.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
  <script type="module">
    import * as THREE from "three";
    import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";
    import { createHud } from "../js/hud.js";
    import { createSplatColoring, createGui } from "../js/gui.js";
    import { createFrustumCulling } from "../js/frustum.js";
    import { createQuestController } from "../js/controller_quest.js";
    import { createWebController } from "../js/controller_web.js";
    import { createTouchController } from "../js/controller_touch.js";
    import { createXr8Fallback } from "../js/ar-xr8.js";

    const stats = new Stats();
    document.body.appendChild(stats.dom);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const spark = new SparkRenderer({
      renderer,
      extSplats: false,
      maxStdDev: Math.sqrt(4),
      behindFoveate: 0.1,
      // Limit to 10K LoD splats so we can clearly see individual splats
      lodSplatCount: 10000,
    });
    scene.add(spark);

    // Local frame of reference - teleporting moves this
    const localFrame = new THREE.Group();
    scene.add(localFrame);
    localFrame.add(camera);

    const { splatColoring, makeSplatIndexColoring } = createSplatColoring();
    const { settings: frustumSettings, makeFrustumCullModifier, updateFrustumUniforms, setSortClipR } = createFrustumCulling();

    function updateAllSplats() {
      world.updateVersion();
    }

    // Peru-WI splat scene
    const world = new SplatMesh({
      url: "/examples/assets/splats/peru-wi/sign_point_cloud_2.compressed.ply",
      lod: true,
      nonLod: true,
    });

    world.enableLod = false;
    world.objectModifiers = [makeSplatIndexColoring(), makeFrustumCullModifier()];
    world.updateGenerator();
    world.position.set(0, -1, 0);
    world.quaternion.set(1, 0, 0, 0);
    scene.add(world);

    const { gui, debugInfo, poseControls } = createGui({ spark, world, splatColoring, frustumSettings, onSplatUpdate: updateAllSplats, onSortClipRChange: setSortClipR });

    const webCtrl   = createWebController({ renderer, camera, localFrame, world });
    const questCtrl = createQuestController({ renderer, scene, camera, localFrame, world });
    const touchCtrl = createTouchController({ camera, localFrame });

    // ─── AR mode — WebXR (Android) or 8th Wall SLAM (iPhone) ────────────────────
    let arMode = false;
    const arOverlay = document.getElementById("ar-overlay");

    const { update: updateHud } = createHud(camera);
    const clock = new THREE.Clock();

    function animate() {
      stats.begin();
      const delta = clock.getDelta();
      webCtrl.update();
      const { bPressed, fovPlus, fovMinus } = questCtrl.update(delta);
      touchCtrl.update(delta);
      localFrame.updateMatrixWorld(true);
      updateFrustumUniforms(camera, world, !world.enableLod);
      poseControls.update(localFrame);
      updateHud(delta, { fovPlus, fovMinus, bPressed });
      renderer.render(scene, camera);
      debugInfo.splatCount = spark.activeSplats;
      stats.end();
    }

    renderer.setAnimationLoop(animate);

    // 8th Wall fallback: used when WebXR immersive-ar is unavailable (iPhone)
    const xr8 = createXr8Fallback({
      renderer,
      camera,
      scene,
      onPerFrame: (delta) => {
        stats.begin();
        webCtrl.update();
        touchCtrl.update(delta);
        localFrame.updateMatrixWorld(true);
        updateFrustumUniforms(camera, world, !world.enableLod);
        poseControls.update(localFrame);
        updateHud(delta, {});
        debugInfo.splatCount = spark.activeSplats;
        stats.end();
      },
      onStart: () => {
        localFrame.position.set(0, 0, 0);
        localFrame.quaternion.identity();
        arMode = true;
        arOverlay.style.display = "none";
        window.parent.postMessage({ type: "spark:ar-state", active: true }, "*");
      },
      onStop: () => {
        renderer.setAnimationLoop(animate);
        arMode = false;
        arOverlay.style.display = "";
        window.parent.postMessage({ type: "spark:ar-state", active: false }, "*");
      },
      xrJsPath: "../assets/8thwall/xr.js",
    });

    async function startAr() {
      // 1) Try WebXR immersive-ar (Android / desktop)
      try {
        if (!navigator.xr) throw new Error("WebXR not available");
        const supported = await navigator.xr.isSessionSupported("immersive-ar");
        if (!supported) throw new Error("immersive-ar not supported");

        const session = await navigator.xr.requestSession("immersive-ar", {
          requiredFeatures: ["local-floor"],
        });
        localFrame.quaternion.identity();
        session.addEventListener("end", () => {
          arMode = false;
          arOverlay.style.display = "";
          window.parent.postMessage({ type: "spark:ar-state", active: false }, "*");
        });
        await renderer.xr.setSession(session);
        arMode = true;
        arOverlay.style.display = "none";
        window.parent.postMessage({ type: "spark:ar-state", active: true }, "*");
        return;
      } catch (webXrErr) {
        console.log("WebXR AR not available, trying 8th Wall fallback:", webXrErr.message);
      }

      // 2) Fall back to 8th Wall SLAM (iPhone / unsupported browsers)
      try {
        await xr8.start();
      } catch (xr8Err) {
        console.error("8th Wall AR failed:", xr8Err);
        window.parent.postMessage({ type: "spark:ar-state", active: false }, "*");
      }
    }

    function stopAr() {
      if (xr8.isActive()) { xr8.stop(); return; }
      const existingSession = renderer.xr.getSession();
      if (existingSession) existingSession.end();
    }

    // Overlay tap → start AR (user gesture needed for camera permission)
    arOverlay.addEventListener("click", startAr);

    // postMessage API for parent-frame integration (index.html AR button)
    window.addEventListener("message", async (e) => {
      if (e.data?.type !== "spark:ar-toggle") return;
      arMode ? stopAr() : startAr();
    });
  </script>
</body>

</html>

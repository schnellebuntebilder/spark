<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Teleport</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "@sparkjsdev/spark": "../../dist/spark.module.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
  <script type="module">
    import * as THREE from "three";
    import { SparkRenderer, SplatMesh, SparkControls, SparkXr } from "@sparkjsdev/spark";

    const stats = new Stats();
    stats.dom.style.position = "fixed";
    document.body.appendChild(stats.dom);

    // Wrap stats in a container used as the WebXR dom-overlay root,
    // so it remains visible inside the VR headset display.
    const xrOverlay = document.createElement("div");
    xrOverlay.style.cssText = "position:fixed;top:0;left:0;pointer-events:none;";
    xrOverlay.appendChild(stats.dom);
    document.body.appendChild(xrOverlay);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const spark = new SparkRenderer({
      renderer,
      extSplats: false,
      maxStdDev: Math.sqrt(4),
      // Only render splats inside (or just past) the view frustum, skip behind
      clipXY: 1.1,
      behindFoveate: 0,
    });
    scene.add(spark);

    // Local frame of reference - teleporting moves this
    const localFrame = new THREE.Group();
    scene.add(localFrame);
    localFrame.add(camera);

    // Peru-WI splat scene
    const world = new SplatMesh({
      url: "/examples/assets/splats/peru-wi/sign_point_cloud_2.compressed.ply",
    });
    world.position.set(0, -1, 0);
    world.quaternion.set(1, 0, 0, 0);
    scene.add(world);

    // Desktop mouse + WASD navigation
    const controls = new SparkControls({ renderer, canvas: renderer.domElement });

    // SparkXr without controller movement - we handle the right controller manually
    const xr = new SparkXr({
      renderer,
      onMouseLeaveOpacity: 0.5,
      onReady: (supported) => console.log(`SparkXr: VR ${supported ? "supported" : "not supported"}`),
      sessionInit: {
        optionalFeatures: ["dom-overlay"],
        domOverlay: { root: xrOverlay },
      },
      controllers: {
        getMove: () => new THREE.Vector3(),
        getRotate: () => new THREE.Vector3(),
        getFast: () => false,
        getSlow: () => false,
      },
    });

    // ─── Height Map (built lazily once splat data is loaded) ─────────────────

    const FLOOR_Y    = -1.0;  // fallback world-space Y when no terrain data available
    const HM_CELL    = 0.5;   // grid cell size in metres
    let   heightGrid = null;  // Map<"cx,cz", {sum,count}> — null until built

    function buildHeightGrid() {
      const grid = new Map();
      world.forEachSplat((_i, center) => {
        const wx = center.x + world.position.x;
        const wy = center.y + world.position.y;
        const wz = center.z + world.position.z;
        const cx = Math.floor(wx / HM_CELL);
        const cz = Math.floor(wz / HM_CELL);
        const key = `${cx},${cz}`;
        const cell = grid.get(key);
        if (cell) { cell.sum += wy; cell.count++; }
        else grid.set(key, { sum: wy, count: 1 });
      });
      if (grid.size === 0) return; // splat data not loaded yet — retry next frame
      heightGrid = grid;
      console.log(`Teleport height grid: ${grid.size} cells`);
    }

    // Average terrain Y in a 5×5 cell window around (x, z)
    function getTerrainHeight(x, z) {
      if (!heightGrid) return FLOOR_Y;
      const cx = Math.floor(x / HM_CELL);
      const cz = Math.floor(z / HM_CELL);
      let sum = 0, count = 0;
      for (let dx = -2; dx <= 2; dx++) {
        for (let dz = -2; dz <= 2; dz++) {
          const cell = heightGrid.get(`${cx + dx},${cz + dz}`);
          if (cell) { sum += cell.sum; count += cell.count; }
        }
      }
      return count > 0 ? sum / count : FLOOR_Y;
    }

    // ─── Teleport System ──────────────────────────────────────────────────────

    const LAUNCH_SPEED = 8.0;   // m/s - arc launch speed
    const GRAVITY      = 9.8;   // m/s²
    const TIME_STEP    = 0.05;  // seconds per arc segment
    const ARC_SEGMENTS = 50;

    // ─── Fade System ──────────────────────────────────────────────────────────

    const FADE_DURATION   = 0.25; // seconds for each half (fade-out / fade-in)
    let   fadeState       = "idle"; // "idle" | "fading-out" | "fading-in"
    let   fadeProgress    = 0;
    let   fadePendingTarget = null; // queued teleport target during fade-out

    const clock = new THREE.Clock();

    // --- Arc tube (rebuilt each frame while aiming) ---
    const arcMaterial = new THREE.MeshBasicMaterial({ color: 0x44ccff, side: THREE.DoubleSide });
    let arcTube = null;

    // --- Target marker: outer ring + translucent disc ---
    const markerGroup = new THREE.Group();
    markerGroup.visible = false;
    scene.add(markerGroup);

    markerGroup.add(new THREE.Mesh(
      new THREE.RingGeometry(0.25, 0.40, 32).rotateX(-Math.PI / 2),
      new THREE.MeshBasicMaterial({ color: 0x44ccff, side: THREE.DoubleSide }),
    ));
    markerGroup.add(new THREE.Mesh(
      new THREE.CircleGeometry(0.22, 32).rotateX(-Math.PI / 2),
      new THREE.MeshBasicMaterial({ color: 0x44ccff, transparent: true, opacity: 0.30, side: THREE.DoubleSide }),
    ));

    // --- Right XR controller ---
    let rightController = null;
    const ctrl0 = renderer.xr.getController(0);
    const ctrl1 = renderer.xr.getController(1);
    // Add controllers to localFrame so their world position stays correct after teleporting
    localFrame.add(ctrl0);
    localFrame.add(ctrl1);

    for (const ctrl of [ctrl0, ctrl1]) {
      ctrl.addEventListener("connected", (e) => {
        if (e.data.handedness === "right") rightController = ctrl;
      });
      ctrl.addEventListener("disconnected", () => {
        if (rightController === ctrl) rightController = null;
      });
    }

    let triggerWasPressed = false;
    let teleportTarget    = null; // THREE.Vector3 | null

    // Simulate a ballistic arc; hit test against terrain height map.
    // Returns sampled points and the terrain-hit point (or null if arc never hits).
    function computeBallisticArc(origin, direction) {
      const points = [];
      const vel    = direction.clone().multiplyScalar(LAUNCH_SPEED);
      const pos    = origin.clone();
      let hitPoint = null;

      for (let i = 0; i < ARC_SEGMENTS; i++) {
        points.push(pos.clone());

        if (i > 0) {
          const terrainY = getTerrainHeight(pos.x, pos.z);
          if (pos.y <= terrainY) {
            const prev = points[i - 1];
            // Interpolate to find the exact crossing point
            const t  = (terrainY - prev.y) / (pos.y - prev.y);
            hitPoint = prev.clone().lerp(pos, t);
            hitPoint.y = terrainY;
            while (points.length < ARC_SEGMENTS) points.push(hitPoint.clone());
            break;
          }
        }

        vel.y  -= GRAVITY * TIME_STEP;
        pos.x  += vel.x * TIME_STEP;
        pos.y  += vel.y * TIME_STEP;
        pos.z  += vel.z * TIME_STEP;
      }

      return { points, hitPoint };
    }

    // Rebuild the arc tube from the given world-space points.
    function updateArcTube(points) {
      if (arcTube) { scene.remove(arcTube); arcTube.geometry.dispose(); arcTube = null; }
      if (points.length < 2) return;
      const curve = new THREE.CatmullRomCurve3(points);
      const geo   = new THREE.TubeGeometry(curve, Math.max(points.length, 20), 0.012, 6, false);
      arcTube = new THREE.Mesh(geo, arcMaterial);
      arcTube.frustumCulled = false;
      scene.add(arcTube);
    }

    function showTeleportUI(hitPoint) {
      if (hitPoint) {
        markerGroup.position.set(hitPoint.x, hitPoint.y + 0.01, hitPoint.z);
        markerGroup.visible = true;
      } else {
        markerGroup.visible = false;
      }
    }

    function hideTeleportUI() {
      if (arcTube) { scene.remove(arcTube); arcTube.geometry.dispose(); arcTube = null; }
      markerGroup.visible = false;
    }

    // Move localFrame so the camera lands on top of the target (horizontal only)
    function performTeleport(target) {
      const camWorld = camera.getWorldPosition(new THREE.Vector3());
      localFrame.position.x += target.x - camWorld.x;
      localFrame.position.z += target.z - camWorld.z;
    }

    renderer.setAnimationLoop(function animate() {
      stats.begin();

      const delta = clock.getDelta();

      // Lazy height grid build once splat data is loaded
      if (!heightGrid) buildHeightGrid();

      // Desktop navigation
      controls.update(localFrame);

      // ─── Fade update ──────────────────────────────────────────────────────
      if (fadeState === "fading-out") {
        fadeProgress = Math.min(1, fadeProgress + delta / FADE_DURATION);
        world.opacity = 1 - fadeProgress;
        if (fadeProgress >= 1) {
          // Fully dark — execute the queued teleport, then fade back in
          if (fadePendingTarget) performTeleport(fadePendingTarget);
          fadePendingTarget = null;
          fadeProgress = 0;
          fadeState = "fading-in";
        }
      } else if (fadeState === "fading-in") {
        fadeProgress = Math.min(1, fadeProgress + delta / FADE_DURATION);
        world.opacity = fadeProgress;
        if (fadeProgress >= 1) {
          world.opacity = 1;
          fadeState = "idle";
        }
      }

      // Read right-hand index-finger trigger (button[0])
      let triggerPressed = false;
      for (const source of renderer.xr.getSession()?.inputSources ?? []) {
        if (source.handedness === "right" && source.gamepad) {
          triggerPressed = source.gamepad.buttons[0]?.pressed ?? false;
        }
      }

      if (triggerPressed && rightController) {
        const origin = new THREE.Vector3();
        const quat   = new THREE.Quaternion();
        rightController.getWorldPosition(origin);
        rightController.getWorldQuaternion(quat);

        // In WebXR, the controller's -Z axis is its pointing direction
        const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(quat);

        const { points, hitPoint } = computeBallisticArc(origin, direction);
        updateArcTube(points);
        showTeleportUI(hitPoint);
        teleportTarget = hitPoint;

      } else if (!triggerPressed && triggerWasPressed) {
        // Trigger released — fade to black, then teleport, then fade back in
        if (teleportTarget && fadeState === "idle") {
          fadePendingTarget = teleportTarget.clone();
          fadeState = "fading-out";
          fadeProgress = 0;
        }
        hideTeleportUI();
        teleportTarget = null;
      } else if (!triggerPressed) {
        hideTeleportUI();
      }

      triggerWasPressed = triggerPressed;

      renderer.render(scene, camera);
      stats.end();
    });
  </script>
</body>

</html>

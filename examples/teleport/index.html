<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Teleport</title>
  <style>
    body {
      margin: 0;
    }
    canvas {
      touch-action: none;
    }
    #ar-btn {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      padding: 12px 22px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 10px;
      font-family: sans-serif;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    #ar-btn.active {
      background: rgba(255, 100, 0, 0.75);
      border-color: orange;
    }
  </style>
</head>

<body>
  <button id="ar-btn">AR</button>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "lil-gui": "/examples/js/vendor/lil-gui/dist/lil-gui.esm.js",
        "@sparkjsdev/spark": "../../dist/spark.module.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
  <script type="module">
    import * as THREE from "three";
    import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";
    import { createHud } from "../js/hud.js";
    import { createSplatColoring, createGui } from "../js/gui.js";
    import { createFrustumCulling } from "../js/frustum.js";
    import { createQuestController } from "../js/controller_quest.js";
    import { createWebController } from "../js/controller_web.js";
    import { createTouchController } from "../js/controller_touch.js";

    const stats = new Stats();
    document.body.appendChild(stats.dom);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const spark = new SparkRenderer({
      renderer,
      extSplats: false,
      maxStdDev: Math.sqrt(4),
      behindFoveate: 0.1,
      // Limit to 10K LoD splats so we can clearly see individual splats
      lodSplatCount: 10000,
    });
    scene.add(spark);

    // Local frame of reference - teleporting moves this
    const localFrame = new THREE.Group();
    scene.add(localFrame);
    localFrame.add(camera);

    const { splatColoring, makeSplatIndexColoring } = createSplatColoring();
    const { settings: frustumSettings, makeFrustumCullModifier, updateFrustumUniforms, setSortClipR } = createFrustumCulling();

    function updateAllSplats() {
      world.updateVersion();
    }

    // Peru-WI splat scene
    const world = new SplatMesh({
      url: "/examples/assets/splats/peru-wi/sign_point_cloud_2.compressed.ply",
      lod: true,
      nonLod: true,
    });

    world.enableLod = false;
    world.objectModifiers = [makeSplatIndexColoring(), makeFrustumCullModifier()];
    world.updateGenerator();
    world.position.set(0, -1, 0);
    world.quaternion.set(1, 0, 0, 0);
    scene.add(world);

    const { gui, debugInfo, poseControls } = createGui({ spark, world, splatColoring, frustumSettings, onSplatUpdate: updateAllSplats, onSortClipRChange: setSortClipR });

    const webCtrl   = createWebController({ renderer, camera, localFrame, world });
    const questCtrl = createQuestController({ renderer, scene, camera, localFrame, world });
    const touchCtrl = createTouchController({ camera, localFrame });

    // ─── AR button (mobile only) ────────────────────────────────────────────────
    const isMobile = navigator.maxTouchPoints > 0 || "ontouchstart" in window;
    const arBtn    = document.getElementById("ar-btn");
    let   arMode   = false;

    if (isMobile) {
      arBtn.style.display = "block";
      arBtn.addEventListener("click", async () => {
        if (!arMode) {
          try {
            // iOS 13+ requires explicit permission for sensor access
            if (typeof DeviceOrientationEvent.requestPermission === "function") {
              const r = await DeviceOrientationEvent.requestPermission();
              if (r !== "granted") return;
            }
            if (typeof DeviceMotionEvent.requestPermission === "function") {
              const r = await DeviceMotionEvent.requestPermission();
              if (r !== "granted") return;
            }
            touchCtrl.setArMode(true);
            arBtn.textContent = "AR ●";
            arBtn.classList.add("active");
            arMode = true;
          } catch (err) {
            console.error("AR sensor permission denied:", err);
          }
        } else {
          touchCtrl.setArMode(false);
          arBtn.textContent = "AR";
          arBtn.classList.remove("active");
          arMode = false;
        }
      });
    }

    const { update: updateHud } = createHud(camera);

    const clock = new THREE.Clock();

    renderer.setAnimationLoop(function animate() {
      stats.begin();

      const delta = clock.getDelta();

      webCtrl.update();
      const { bPressed, fovPlus, fovMinus } = questCtrl.update(delta);
      touchCtrl.update(delta);

      // Update localFrame → camera world matrix before computing frustum
      localFrame.updateMatrixWorld(true);
      updateFrustumUniforms(camera, world, !world.enableLod);

      // Sync pose GUI ↔ localFrame (reads after controllers so display is current)
      poseControls.update(localFrame);

      updateHud(delta, { fovPlus, fovMinus, bPressed });

      renderer.render(scene, camera);
      debugInfo.splatCount = spark.activeSplats;
      stats.end();
    });
  </script>
</body>

</html>

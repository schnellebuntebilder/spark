<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Streaming LoD</title>
  <style>
    body {
      margin: 0;
      background-color: black;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    .overlay {
      position: fixed;
      margin: 12px;
      bottom: 0;
      color: white;
    }
    .overlay > * {
      margin: 6px;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.module.js",
        "lil-gui": "/examples/js/vendor/lil-gui/dist/lil-gui.esm.js",
        "@sparkjsdev/spark": "../../dist/spark.module.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
  <div class="overlay">
    <h2 id="title"></h2>
    <p id="subtitle"></p>
  </div>
  <canvas id="canvas" tabindex="0" style="outline: none;"></canvas>
  <script type="module">
    import * as THREE from "three";
    import { SparkRenderer, SplatMesh, SparkControls, isMobile } from "@sparkjsdev/spark";
    import { createQuestController } from "../js/controller_quest.js";
    import GUI from "lil-gui";

    const stats = new Stats();
    document.body.appendChild(stats.dom);

    const initialWorld = "Peru WI (LoD Streaming)";
    const worlds = {
      "Hobbiton": {
        url: "https://storage.googleapis.com/forge-dev-public/asundqui/rad/260219/tijerin_w6_hobbiton-lod.rad",
        quaternion: [1, 0, 0, 0],
        background: "#cafefe",
        description: "24M splats created by Tijerin with World Labs Marble",
      },
      "Peru WI": {
        url: "/examples/assets/splats/peru-wi/sign_point_cloud_2.compressed.ply",
        paged: false,
        quaternion: [1, 0, 0, 0],
        position: [0, -1, 0],
        background: "#cafefe",
        highDpi: !isMobile(),
        description: "Roadside sign scanned in Peru, Wisconsin",
      },
      "Peru WI (LoD Streaming)": {
        url: "/examples/assets/splats/peru-wi/peru-sign-point_cloud-lod.rad",
        paged: true,
        quaternion: [0, 1, 1, 0],
        position: [0, -1, 0],
        background: "#cafefe",
        highDpi: !isMobile(),
        description: "Peru WI sign – Quest 3 optimised streaming LoD (8.3M splats, csplat, SH1)",
      },
    };

    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#000000");
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);

    // localFrame is the moveable "floor" reference; teleporting shifts this group.
    // The camera lives inside it so XR head-tracking applies on top of our position.
    const localFrame = new THREE.Group();
    scene.add(localFrame);
    localFrame.add(camera);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("canvas") });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onWindowResize, false);

    const spark = new SparkRenderer({
      renderer,
      pagedExtSplats: true,
      coneFov0: 70.0,
      coneFov: 120.0,
      behindFoveate: 0.2,
      coneFoveate: 0.4,
    });
    scene.add(spark);

    const settings = {
      worldKey: initialWorld,
    };
    let world = null;
    let questCtrl = null;

    function selectWorld(worldKey) {
      if (world) {
        scene.remove(world);
        world.dispose();
      }

      const { url, quaternion, position, scale, background, description, cameraPosition, cameraQuaternion, lodSplatScale, highDpi, paged } = worlds[worldKey];
      world = new SplatMesh({ url, paged: paged ?? true });
      world.quaternion.set(...quaternion ?? [0, 0, 0, 1]).normalize();
      world.position.set(...(position ?? [0, 0, 0]));
      world.scale.setScalar(scale ?? 1.0);
      scene.add(world);
      scene.background = new THREE.Color(background);

      camera.position.set(...(cameraPosition ?? [0, 0, 0]));
      camera.quaternion.set(...(cameraQuaternion ?? [0, 0, 0, 1])).normalize();
      title.textContent = worldKey;
      subtitle.textContent = description;
      spark.lodSplatScale = lodSplatScale ?? 0.34;
      renderer.setPixelRatio(highDpi ? window.devicePixelRatio : 1);
      onWindowResize();
      console.log("Render size", renderer.domElement.width, renderer.domElement.height);
      renderer.domElement.focus();

      // Rebuild terrain height grid for the new world
      questCtrl?.resetHeightGrid();
    }

    selectWorld(settings.worldKey);

    const gui = new GUI({ title: "Settings" });
    gui.add(settings, "worldKey", Object.keys(worlds)).name("World").onChange(selectWorld);
    gui.add(spark, "lodSplatScale", 0.01, 2.5, 0.001).name("Level of Detail").listen();

    const controls = new SparkControls({ canvas: renderer.domElement });

    // Quest / WebXR controller: teleport arc + fade + gamepad navigation.
    // Uses a getter so it always references the currently active world.
    questCtrl = createQuestController({
      renderer,
      scene,
      camera,
      localFrame,
      world: () => world,
    });

    const clock = new THREE.Clock();

    renderer.setAnimationLoop(function animate() {
      stats.begin();
      const delta = clock.getDelta();
      controls.update(localFrame);
      questCtrl.update(delta);
      renderer.render(scene, camera);
      stats.end();
    });
  </script>
</body>

</html>
